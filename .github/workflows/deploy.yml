name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  BACKEND_REPOSITORY: saas-api-platform
  FRONTEND_REPOSITORY: saas-frontend

jobs:
  lint-test:
    name: Lint and test backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saasdb_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint backend
        run: |
          cd backend
          ruff check app tests

      - name: Test backend
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/saasdb_test
          REDIS_URL: redis://localhost:6379/0
          API_KEY_PEPPER: ci-api-key-pepper-change-me
          JWT_SECRET: ci-jwt-secret-change-me
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_TEST_MODE: "true"
        run: |
          cd backend
          pytest -q

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: [lint-test, frontend-build]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG ./backend
          docker tag $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$BACKEND_REPOSITORY:latest
          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:latest

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.PRODUCTION_API_URL }} \
            -t $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG ./frontend
          docker tag $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest
          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /app/saas-api-platform
            git pull origin main

            aws ecr get-login-password --region ap-south-1 \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/' .env
            else
              echo 'IMAGE_TAG=${{ github.sha }}' >> .env
            fi

            docker compose pull backend worker frontend
            docker compose up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose up -d --no-deps worker frontend nginx
            docker compose exec -T backend alembic upgrade head
            docker compose up -d --no-deps --scale backend=1 backend

            sleep 20

            if ! curl -f http://localhost:8000/health; then
            echo "Health check failed"

            docker compose down

            docker compose up -d

            exit 1
            fi

            docker image prune -f
