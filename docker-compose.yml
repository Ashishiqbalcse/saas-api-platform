services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saasdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d saasdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ${ECR_REGISTRY:-local}/saas-api-platform:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: ${ECR_REGISTRY:-local}/saas-api-platform:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    env_file: .env
    command: ["celery", "-A", "app.jobs.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    image: ${ECR_REGISTRY:-local}/saas-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  stripe_cli:
    image: stripe/stripe-cli:latest
    profiles: ["stripe"]
    command: ["listen", "--forward-to", "http://nginx/api/billing/webhook"]
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
